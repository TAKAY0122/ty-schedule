name = "ty-schedule"
main = "src/index.js"
compatibility_date = "2025-01-01"

[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "schedule-db"
database_id = "あなたの実際のID"

[[r2_buckets]]
binding = "DAICHO"
bucket_name = "ty-daicho"

[triggers]
crons = ["0 * * * *"]