<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RB事業2課 スケジュール管理 — 動くデモ</title>
<style>
/* RB事業2課 スケジュール管理 — シック(濃紺 × 金)*/
:root{
  --ink:#1b2333;          /* 濃紺 */
  --ink2:#2a3550;
  --gold:#c9a227;         /* 金 */
  --paper:#f5f4f0;
  --line:#c9c9c4;
  --cell-site:#ffe94d;    /* 現場名(黄)*/
  --cell-off:#d93636;     /* 休暇・×(赤)*/
  --sat:#1f5fd6; --sun:#d93636;
  --ok:#2e7d32; --warn:#b26a00;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:var(--paper);color:#222;font-size:14px}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--line);border-radius:4px;background:#fff}
input:focus,select:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:0}
a{color:var(--ink2)}

/* ===== ヘッダー ===== */
header{background:var(--ink);color:#f3f1ea;display:flex;align-items:center;gap:12px;padding:0 12px;height:54px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.brand{font-weight:700;letter-spacing:.06em;border-left:3px solid var(--gold);padding-left:9px;white-space:nowrap;font-size:15px}
.brand small{display:block;font-size:9px;color:var(--gold);letter-spacing:.2em;font-weight:400}
.cur-page{font-size:15px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.hright{display:flex;align-items:center;gap:10px;margin-left:auto}
.bell{position:relative;background:none;border:none;font-size:18px;color:#f3f1ea;padding:4px;cursor:pointer}
.bell .badge{position:absolute;top:-4px;right:-6px;background:var(--cell-off);color:#fff;font-size:10px;border-radius:9px;padding:1px 5px;font-weight:700}
.uname{font-size:12px;color:#cfd4e0;white-space:nowrap;text-align:right;line-height:1.25}
.menu-btn{background:none;border:1px solid #4a5570;color:#f3f1ea;border-radius:5px;padding:6px 11px;font-size:17px;cursor:pointer;line-height:1}
.menu-btn:hover{background:var(--ink2)}

/* ハンバーガー ドロワー */
#menu-drawer:empty{display:none}
.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:80}
.drawer{position:fixed;top:0;left:0;height:100%;width:260px;max-width:82vw;background:#fff;z-index:90;box-shadow:4px 0 24px rgba(0,0,0,.3);overflow-y:auto;animation:slidein .18s ease}
@keyframes slidein{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.drawer-head{background:var(--ink);color:var(--gold);font-weight:700;letter-spacing:.1em;padding:16px 18px;font-size:13px}
.drawer-link{display:block;width:100%;text-align:left;padding:13px 18px;border:none;background:none;font-size:14.5px;color:#222;text-decoration:none;cursor:pointer;border-bottom:1px solid #f0eee7}
.drawer-link:hover{background:#f5f3ec}
.drawer-link.active{background:#fdf6e0;color:var(--ink);font-weight:700;box-shadow:inset 4px 0 0 var(--gold)}
.drawer-link.danger{color:#b23b3b}
.drawer-sep{height:8px;background:#f0eee7}
.dropdown{position:absolute;right:12px;top:50px;background:#fff;color:#222;border:1px solid var(--line);border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.2);min-width:230px;z-index:100;overflow:hidden}
.dropdown button,.dropdown a{display:block;width:100%;text-align:left;padding:11px 14px;border:none;background:none;font-size:13px;text-decoration:none;color:#222}
.dropdown button:hover,.dropdown a:hover{background:#f0eee7}
.dropdown .sep{border-top:1px solid var(--line)}
.notif-list{max-height:380px;overflow-y:auto}
.notif-item{padding:10px 14px;border-bottom:1px solid #eee;font-size:12.5px;line-height:1.5}
.notif-item.unread{background:#fdf6e0}
.notif-item time{display:block;color:#888;font-size:10.5px}
/* 折り返し防止(名前・カタカナ・登録番号など) */
.nowrap{white-space:nowrap}
table.list td.nowrap,table.list th{white-space:nowrap}
select.nowrap{max-width:none}

/* ===== レイアウト ===== */
main{max-width:1100px;margin:0 auto;padding:18px 14px 60px}
h2{font-size:17px;margin:6px 0 14px;color:var(--ink);border-left:4px solid var(--gold);padding-left:9px}
.card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.btn{background:var(--ink);color:#fff;border:none;border-radius:5px;padding:8px 16px;font-size:13px}
.btn:hover{background:var(--ink2)}
.btn.gold{background:var(--gold);color:#1b2333;font-weight:700}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.danger{background:var(--cell-off)}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.xs{padding:2px 7px;font-size:11px;display:block;width:100%}
tr.slot-extra td.slot-cont{color:#aaa;background:#fafafa}
tr.slot-extra{background:#fcfcfa}
.msg{padding:9px 12px;border-radius:5px;margin:8px 0;font-size:13px}
.msg.ok{background:#e6f4e6;color:var(--ok)}
.msg.err{background:#fdebeb;color:#b71c1c}
.tag{display:inline-block;font-size:11px;border-radius:3px;padding:2px 7px;font-weight:700}
.tag.admin{background:#1b2333;color:var(--gold)}
.tag.handler{background:var(--gold);color:#1b2333}
.tag.chief{background:#3b5bdb;color:#fff}
.tag.member{background:#d8d6cf;color:#444}
.tag.pending{background:#ffe1b3;color:#8a5300}
.tag.checked{background:#d7ecd7;color:#2e7d32}
.muted{color:#888;font-size:12px}

/* ===== ログイン ===== */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--ink) 0%,#0e1320 100%)}
.login-card{background:#fff;border-radius:10px;padding:38px 34px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.login-card h1{font-size:18px;color:var(--ink);text-align:center;margin-bottom:4px;letter-spacing:.05em}
.login-card .sub{color:var(--gold);text-align:center;font-size:11px;letter-spacing:.3em;margin-bottom:24px}
.login-card input{width:100%;margin-bottom:12px;padding:11px}
.login-card .btn{width:100%;padding:12px;font-size:14px}
.login-card .hint{font-size:11px;color:#999;text-align:center;margin-top:14px}

/* ===== スケジュール表(写真風)===== */
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.month-nav .mtitle{font-size:17px;font-weight:700;color:var(--ink);min-width:120px;text-align:center}
.sched-wrap{overflow-x:auto;border:1px solid #888;border-radius:4px;background:#fff}
table.sched{border-collapse:collapse;width:100%;min-width:780px;font-size:12.5px}
table.sched th{background:var(--ink);color:#fff;border:1px solid #555;padding:6px 4px;font-size:12px;white-space:nowrap}
table.sched td{border:1px solid #999;padding:4px 6px;height:30px;background:#fff}
table.sched td.c{text-align:center}
table.sched td.r{text-align:right}
td.day{width:34px;text-align:center;font-weight:700}
td.wd{width:30px;text-align:center;font-weight:700}
.wd.sat{color:#fff;background:var(--sat)!important}
.wd.sun{color:#fff;background:var(--sun)!important}
td.site-multi{background:var(--cell-site);font-weight:600;max-width:230px;line-height:1.5}
.site-cell{cursor:pointer;border-radius:3px}
.site-cell:hover{outline:2px solid var(--gold)}
td.off-cell{background:var(--cell-off);color:#fff;font-weight:700}
td.venue-multi{max-width:200px;line-height:1.5}
.venue-cell{cursor:pointer;color:#1a4fb0}
.venue-cell:hover{text-decoration:underline}
.rookie-badge{display:inline-block;background:#2e7d32;color:#fff;font-size:10px;border-radius:3px;padding:1px 5px;margin-left:5px;vertical-align:middle}
td.note-cell{max-width:180px;font-size:11.5px;color:#444}
td.plan-cell{max-width:180px;font-size:11.5px;color:#444;cursor:default}
td.plan-cell[data-date]:hover{outline:1px solid var(--gold)}
.plan-edit{color:var(--gold);font-size:11px;opacity:.6}
tr.total-row td{background:#efede6;font-weight:700;border-top:2px solid #555}
.red-num{color:#c62828;font-weight:700}

/* ===== 入力グリッド ===== */
table.egrid{border-collapse:collapse;width:100%;font-size:12px}
table.egrid th{background:var(--ink);color:#fff;padding:5px;border:1px solid #555;font-size:11.5px}
table.egrid td{border:1px solid #bbb;padding:2px}
table.egrid input,table.egrid select{width:100%;border:none;padding:5px 6px;border-radius:0;background:transparent}
table.egrid input:focus,table.egrid select:focus{background:#fffbe6}
.tin-col{width:62px}.pay-col{width:80px}.type-col{width:78px}

/* ===== 汎用テーブル ===== */
table.list{border-collapse:collapse;width:100%;font-size:13px;background:#fff}
table.list th{background:var(--ink);color:#fff;padding:8px;border:1px solid #444;font-size:12px;white-space:nowrap}
table.list td{border:1px solid #ccc;padding:7px 8px}
table.list tr.click:hover{background:#fdf6e0;cursor:pointer}

/* ===== フォーム ===== */
.form-grid{display:grid;grid-template-columns:170px 1fr;gap:10px 14px;align-items:center;max-width:640px}
.form-grid label{font-size:13px;font-weight:600;color:var(--ink)}
.form-grid textarea{min-height:80px}
.section-label{grid-column:1/-1;background:#efede6;padding:6px 10px;border-left:4px solid var(--gold);font-weight:700;font-size:13px;margin-top:8px}

/* ===== モーダル ===== */
.modal-bg{position:fixed;inset:0;background:rgba(15,20,35,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:#fff;border-radius:8px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;padding:20px;box-shadow:0 24px 80px rgba(0,0,0,.45)}
.modal h3{color:var(--ink);border-bottom:2px solid var(--gold);padding-bottom:8px;margin-bottom:12px;font-size:15px}
.modal .close-x{float:right;background:none;border:none;font-size:18px;color:#888}
.kv{display:grid;grid-template-columns:140px 1fr;gap:6px 12px;font-size:13px;margin-bottom:8px}
.kv dt{font-weight:700;color:var(--ink)}
.kv dd{white-space:pre-wrap}

/* ===== オンライン表示 ===== */
.online-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#2ecc71;margin-right:7px}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(46,204,113,.5)}70%{box-shadow:0 0 0 7px rgba(46,204,113,0)}100%{box-shadow:0 0 0 0 rgba(46,204,113,0)}}

/* PC/スマホ 表示切替(デフォルト=PC:日リストを隠す) */
.sp-only{display:none}
.pc-only{display:block}

/* スマホ用 日リスト(デフォルト非表示。@media で表示) */
.sched-mobile{display:none;flex-direction:column;gap:8px}
.m-day{display:flex;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.m-day.m-empty{opacity:.55}
.m-date{flex:0 0 52px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f5f3ec;border-right:1px solid var(--line);padding:8px 0}
.m-date.sat{background:#e8f0fb}.m-date.sun{background:#fbeaea}
.m-dnum{font-size:20px;font-weight:700;color:var(--ink);line-height:1}
.m-dwd{font-size:12px;color:#666;margin-top:2px}
.m-date.sat .m-dwd{color:#2f6fb0}.m-date.sun .m-dwd{color:#c0392b}
.m-content{flex:1;padding:9px 11px;min-width:0;display:flex;flex-direction:column;gap:7px}
.m-none{color:#bbb;font-size:13px}
.m-off-label{display:inline-block;font-weight:700;color:#c0392b;font-size:14px}
.m-site{padding:7px 9px;background:#fcfbf7;border:1px solid #ece9df;border-radius:6px;display:flex;flex-direction:column;gap:4px}
.m-site + .m-site{margin-top:2px}
.m-sitename{font-weight:700;font-size:15px;color:var(--ink);word-break:break-word}
.m-line{display:flex;gap:8px;font-size:13px;line-height:1.5}
.m-k{flex:0 0 40px;color:#888;font-size:12px;padding-top:1px}
.m-v{flex:1;color:#222;word-break:break-word;min-width:0}
.m-plan{cursor:pointer}
.m-total{margin-top:4px;padding:11px 14px;background:var(--ink);color:#fff;border-radius:8px;display:flex;flex-direction:column;gap:3px;font-size:13.5px}
.m-total b{color:var(--gold)}.m-total b.red-num{color:#ff8a8a}

/* スマホ用 汎用カード(一覧表の代替。デフォルト非表示) */
.cards{display:none;flex-direction:column;gap:10px}
.dcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.dcard.clickable{cursor:pointer}
.dcard-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #f0eee7}
.dcard-title{font-weight:700;font-size:15.5px;color:var(--ink);word-break:break-word}
.dcard-sub{font-size:12px;color:#888}
.drow{display:flex;gap:10px;font-size:13.5px;padding:3px 0;line-height:1.5}
.dk{flex:0 0 80px;color:#888;font-size:12.5px}
.dv{flex:1;color:#222;word-break:break-word;min-width:0}
.dcard-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.dcard-actions select{flex:1;min-width:120px}
.dscore{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.dscore span{background:#f5f3ec;border-radius:5px;padding:2px 8px;font-size:12px}

/* スマホ用 スケジュール入力(日選択フォーム) */
.me-pick{display:flex;align-items:center;gap:10px;margin-bottom:12px;background:var(--ink);padding:10px 12px;border-radius:8px}
.me-pick label{color:#fff;font-size:13px;font-weight:600}
.me-pick select{flex:1;font-size:15px;padding:8px}
.me-slot{border:1px solid var(--line);border-radius:8px;padding:11px 12px;margin-bottom:10px;background:#fcfbf7}
.me-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.me-row:last-child{margin-bottom:0}
.me-row label{flex:0 0 76px;font-size:13px;color:#555}
.me-row input,.me-row select{flex:1;font-size:16px;padding:8px;min-width:0}
.me-fields{margin-top:4px}
.me-del{margin-top:6px}

/* 完了ポップアップ */
.popup-modal{max-width:340px;text-align:center;padding:24px 22px}
.popup-icon{font-size:42px;line-height:1}
.popup-msg{margin-top:10px;font-size:15px;color:#222;line-height:1.6;font-weight:600}

/* 一括登録セクション */
.bulk-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-size:14px;color:var(--ink)}
.bulk-head b{color:var(--gold-d,#a07e10)}
.bulk-label{font-size:13px;font-weight:700;color:#444}
.bulk-chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:inline-flex;align-items:center;gap:6px;background:#fdf6e0;border:1px solid #e6cf85;border-radius:14px;padding:3px 10px;font-size:13px}
.chip button{background:none;border:none;color:#b23b3b;cursor:pointer;font-size:12px;padding:0}
.bulk-members{display:flex;flex-direction:column;gap:2px;max-height:240px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;padding:8px}
.bulk-all{font-weight:700;padding:6px 4px;border-bottom:1px solid #eee;margin-bottom:4px;display:flex;gap:8px;align-items:center}
.bulk-mem{display:flex;align-items:center;gap:8px;padding:7px 4px;font-size:14px}
.bulk-mem input{width:18px;height:18px}
.bulk-sub{color:#999;font-size:12px;margin-left:auto}

/* 一括登録:メンバーごとの割り当てカード */
.bk-person{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:10px;background:#fff}
.bk-person-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f0eee7}
.bk-person-head b{font-size:15px;color:var(--ink)}
.bk-person-del{margin-left:auto;background:none;border:1px solid #e0a0a0;color:#b23b3b;border-radius:5px;padding:3px 9px;font-size:12px;cursor:pointer}
.bk-d-input{font-size:15px;padding:7px}

/* 現場一覧 */
.st-day{margin-bottom:14px}
.st-date{font-weight:700;color:var(--ink);font-size:14px;padding:4px 0;border-bottom:2px solid var(--gold);margin-bottom:8px}
.st-date.sat{color:#2f6fb0}.st-date.sun{color:#c0392b}
.st-sites{display:flex;flex-direction:column;gap:8px}
.st-site{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px 14px;cursor:pointer;font-size:14px}
.st-site:hover{background:#fdf6e0;border-color:#e6cf85}
.st-site-name{font-weight:700;color:var(--ink);font-size:15px}
.st-site-venue{color:#777;font-size:13px}
.st-site-cnt{margin-left:auto;background:var(--ink);color:#fff;border-radius:12px;padding:2px 10px;font-size:12px;font-weight:700;flex:0 0 auto}

/* ===== タブレット ===== */
@media (max-width:900px){
  main{padding:14px 10px 60px}
  nav a{padding:8px 8px;font-size:12.5px}
  .form-grid{grid-template-columns:150px 1fr}
}

/* ===== スマホ ===== */
@media (max-width:640px){
  header{height:52px;padding:0 8px;gap:8px}
  .brand{font-size:13px}
  .brand small{display:none}
  .cur-page{font-size:14px}
  .menu-btn{padding:6px 9px;font-size:16px}
  .uname{font-size:10.5px;line-height:1.15;max-width:90px;overflow:hidden;text-overflow:ellipsis}
  main{padding:10px 6px 70px}
  h2{font-size:17px}
  .card{padding:12px}
  .sched-wrap,.list-wrap{position:relative}
  table.sched{min-width:680px;font-size:12px}
  table.list{font-size:12px;min-width:560px}
  table.list th,table.list td{padding:6px 5px}
  table.egrid{min-width:680px}
  .form-grid{grid-template-columns:1fr;gap:7px 0}
  .form-grid label{font-weight:600;margin-top:6px}
  /* ボタンはタップしやすく */
  .btn{padding:9px 14px;font-size:14px}
  .btn.sm,.btn.xs{padding:6px 10px;font-size:12.5px}
  /* 月ナビ */
  .month-nav .mtitle{font-size:15px;min-width:90px}
  .row{flex-wrap:wrap;gap:8px}
  /* モーダルは画面いっぱい近くに */
  .modal{max-width:100%;width:100%;max-height:92vh;padding:16px;border-radius:10px 10px 0 0}
  .modal-bg{align-items:flex-end}
  .dropdown{right:6px;left:6px;min-width:auto}
  /* 入力欄が小さすぎないように(iOSズーム防止に16px) */
  input,select,textarea{font-size:16px}
  table.egrid input,table.egrid select{font-size:13px}
  /* リスト系テーブルはセル内折り返さず横スクロール(現場情報・報告一覧など) */
  table.list td{white-space:nowrap}
  /* スケジュールはPC表を隠し、スマホ用 日リストを表示 */
  .pc-only{display:none !important}
  .sp-only{display:block}
  .sched-mobile.sp-only{display:flex}
  .cards.sp-only{display:flex}
  .m-total .red-num{color:#ff8a8a}
}

/* スクロール可能なテーブルの右端にうっすらフェード(横スクロールを示唆) */
.sched-wrap::after{content:"";position:absolute;top:0;right:0;width:18px;height:100%;
  background:linear-gradient(to right,rgba(255,255,255,0),rgba(255,255,255,.9));pointer-events:none;opacity:0;transition:opacity .2s}
@media (max-width:900px){ .sched-wrap{position:relative} .sched-wrap::after{opacity:1} }

/* ===== 課(1課/2課)の視覚区別 ===== */
:root{ --ka1:#2E6FB7; --ka1-bg:#EAF2FB; --ka2:#C9A227; --ka2-bg:#FBF6E7; }
.ka-tabs{ display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.ka-tab{ flex:1; min-width:100px; padding:10px 12px; border:2px solid var(--line); border-radius:10px;
  background:#fff; font-weight:700; cursor:pointer; font-size:15px; transition:all .15s; }
.ka-tab.ka2.on{ border-color:var(--ka2); background:var(--ka2-bg); color:#8a6d12; }
.ka-tab.ka1.on{ border-color:var(--ka1); background:var(--ka1-bg); color:#1f5391; }
.ka-tab.on{ box-shadow:0 2px 6px rgba(0,0,0,.08); }

<script>
/* ===== デモ用モックAPI =====
   実アプリのサーバー(Cloudflare Worker)の挙動を、ブラウザ内のメモリだけで再現します。
   app.js の api(path,opt) はこの mockApi に差し替えられます。サーバー・DB不要。
*/
(function(){
'use strict';

const LV = { member:0, chief:1, handler:2, admin:3 };
const HOURLY = 1150;
const nowJst = () => new Date(Date.now()+9*3600e3);
const jstDate = () => nowJst().toISOString().slice(0,10);
const jstTs = () => nowJst().toISOString().slice(0,19).replace('T',' ');
const pad = n => String(n).padStart(2,'0');

// ---- 給与計算(実アプリと同じルール)----
const DUTY_MAP={'案内':'g5','受付・案内':'g5','準備':'g5','本部付':'g5','制作補助':'g5','運営補助':'g5','雑務':'g5','準備・設営':'l3','搬入':'l3','搬出':'l3','機材搬入':'l3','機材搬出':'l3','ステージハンド':'l3','搬入・案内':'lg','案内・搬出':'gl','パッケージ':'lgl','ケータリング':'skip','物品販売':'skip'};
const PAY_RANKS=['A','B','C','D','E'];
function rankLetter(r){const m=String(r||'').match(/[A-Ea-e]/);return m?m[0].toUpperCase():'';}
function seedWageRates(){ const T={A:{g:[1160,1220],l:[1260,1320]},B:{g:[1150,1210],l:[1250,1310]},C:{g:[1140,1200],l:[1240,1300]},D:{g:[1130,1190],l:[1230,1290]},E:{g:[1120,1180],l:[1120,1280]}}; DB.wageRates=[]; for(const rk in T){ DB.wageRates.push({effective_from:'1900-01-01',rank:rk,kind:'guide',amount:T[rk].g[0]},{effective_from:'1900-01-01',rank:rk,kind:'load',amount:T[rk].l[0]},{effective_from:'2025-10-01',rank:rk,kind:'guide',amount:T[rk].g[1]},{effective_from:'2025-10-01',rank:rk,kind:'load',amount:T[rk].l[1]}); } }
function resolveWage(rank,kind,date){ let best=null; for(const w of (DB.wageRates||[])){ if(w.rank===rank&&w.kind===kind&&w.effective_from<=date) best=w.amount; } return best; }
function payLockDate(){ const d=new Date(Date.now()+9*3600e3); d.setDate(d.getDate()-14); return d.toISOString().slice(0,10); }
function calcPay(o){ const R=rankLetter(o.rank); const seg=DUTY_MAP[o.duty]||(o.duty?'skip':'g5');
  const m=t=>{const x=String(t==null?'':t).match(/^(\d{1,2}):(\d{2})$/);return x?Number(x[1])*60+Number(x[2]):null;};
  let IN=m(o.tin),OUT=m(o.tout); if(IN==null||OUT==null) return {hours:0,overtime:0,night:0,pay:0};
  if(OUT<=IN) OUT+=1440; const H=x=>x/60,total=H(OUT-IN);
  if(seg==='skip'||!PAY_RANKS.includes(R)) return {hours:Math.round(total*100)/100,overtime:Math.round(Math.max(0,total-9)*100)/100,night:0,pay:0};
  const gw=resolveWage(R,'guide',o.date)||0, lw=resolveWage(R,'load',o.date)||0;
  let LE=m(o.loadEnd),SE=m(o.showEnd); if(LE!=null&&LE<IN)LE+=1440; if(SE!=null&&SE<IN)SE+=1440;
  let base=0;
  if(seg==='g5'||seg==='l3'){const main=seg[0]==='l'?lw:gw,min=Number(seg[1]);base=Math.max(total,min)*main;}
  else if(seg==='lg'){base=LE==null?total*gw:H(LE-IN)*lw+H(OUT-LE)*gw;}
  else if(seg==='gl'){base=SE==null?total*gw:H(SE-IN)*gw+H(OUT-SE)*lw;}
  else if(seg==='lgl'){base=(LE==null||SE==null)?total*gw:H(LE-IN)*lw+H(SE-LE)*gw+H(OUT-SE)*lw;}
  const OT=Math.max(0,total-13), night=OUT>=1320?H(OUT-1320):0;
  const pay=Math.round(base+OT*gw*0.25+night*gw*0.25+(o.multi?500:0));
  return {hours:Math.round(total*100)/100,overtime:Math.round(Math.max(0,total-9)*100)/100,night:Math.round(night*100)/100,pay};
}
function calcShift(tin,tout){ return calcPay({rank:'',tin,tout}); }

// ---- インメモリDB ----
const DB = {
  users: [],         // {id,regno,name,role,rank,han,station,skills,pass,first}
  schedule: [],      // {id,user_id,date,slot,type,site,venue,tin,tout,hours,overtime,pay,note}
  devplan: {},       // key user_id|date -> plan
  history: [],       // {id,ts,editor_id,editor_name,target_id,target_name,date,before,after}
  reports: [],
  blacklist: [],
  notifications: [], // {id,user_id,ts,kind,text,read}
  settings: { handler_pin:'111111', import_token:'demo-token-0001', import_urls:'[]' },
  seq: { user:0, sched:0, hist:0, report:0, bl:0, notif:0 },
};
let SESS = null; // { user_id, handler }

function uid(k){ return ++DB.seq[k]; }
function findUser(id){ return DB.users.find(u=>u.id===id); }
function findByRegno(r){ return DB.users.find(u=>u.regno===String(r)); }
function pub(u){ return { id:u.id, regno:u.regno, name:u.name, role:u.role, rank:u.rank, ka:u.ka||"", han:u.han, station:u.station, skills:u.skills||'', manager_id:u.manager_id??null, suspended:u.suspended?1:0, first: u.pass===null }; }
function lv(u){ return LV[u.role] ?? 0; }
function me(){ return SESS ? findUser(SESS.user_id) : null; }
function handlerMode(){ return SESS && SESS.handler===1 && lv(me())>=2; }
function err(msg, code){ const e=new Error(msg); e.status=code||400; throw e; }
function notFound(){ err('ページが見つかりません', 404); }

function addUser(o){
  const u = Object.assign({ id:uid('user'), skills:'', manager_id:null, pass:null }, o);
  DB.users.push(u); return u;
}
function notify(userIds, kind, text){
  for(const id of userIds) DB.notifications.push({ id:uid('notif'), user_id:id, ts:jstTs(), kind, text, read:0 });
}
function notifyChiefs(kind,text){ notify(DB.users.filter(u=>lv(u)>=1).map(u=>u.id), kind, text); }

function stripRow(r){ return { type:r.type, site:r.site, venue:r.venue, tin:r.tin, tout:r.tout, pay:r.pay, note:r.note }; }
function surname(name){ const n=String(name||'').trim(); if(!n) return ''; return n.split(/[\s　]+/)[0]; }
function withAuthor(text, authorName){
  const t=String(text==null?'':text).trim(); if(!t) return '';
  const short=surname(authorName); if(!short) return t;
  const stripped=t.replace(/\s*[（(][^（）()]*[）)]\s*$/,'').trim();
  return stripped+'('+short+')';
}

// ---- スケジュール書き込み(1日複数slot)----
function writeDay(uidNum, date, slots, editorId, srcLabel){
  const before = DB.schedule.filter(s=>s.user_id===uidNum && s.date===date).sort((a,b)=>a.slot-b.slot);
  const valid = slots.filter(e=>e.type);
  DB.schedule = DB.schedule.filter(s=>!(s.user_id===uidNum && s.date===date));
  const editorName = editorId===0 ? '' : (findUser(editorId)||{}).name || '';
  const saved=[]; let slot=0;
  for(const e of valid){
    let hours=0,overtime=0,pay=0;

// 取り込み共通(複数現場対応)
function applyImportRows(rows, editorId, mode, srcLabel){
  let applied=0, skipped=0; const errors=[];
  const groups={}, order=[];
  for(const r of rows){
    const regno=String(r.regno||'').trim(), date=String(r.date||'').trim();
    if(!regno||!date){ skipped++; continue; }
    const u=findByRegno(regno);
    if(!u){ errors.push(`登録番号 ${regno} は未登録(${date})`); skipped++; continue; }
    const key=u.id+'|'+date;
    if(!groups[key]){ groups[key]={uid:u.id,date,items:[]}; order.push(key); }
    groups[key].items.push(r);
  }
  for(const key of order){
    const {uid:U,date,items}=groups[key];
    const before=DB.schedule.filter(s=>s.user_id===U&&s.date===date).sort((a,b)=>a.slot-b.slot);
    const incoming=items.map(r=>({ type:['work','off','paid','x'].includes(r.type)?r.type:'work', site:r.site||'', venue:r.venue||'', tin:r.tin||'', tout:r.tout||'', pay:r.pay, note:r.note||'' }));
    let finalSlots;
    if(mode==='add'){
      const seen=new Set(before.map(b=>b.site));
      finalSlots=before.map(stripRow);
      for(const it of incoming){ if(it.site&&seen.has(it.site)) continue; finalSlots.push(it); seen.add(it.site); }
    } else finalSlots=incoming;
    const bj=JSON.stringify(before.map(stripRow)), aj=JSON.stringify(finalSlots.map(s=>({type:s.type,site:s.site,venue:s.venue,tin:s.tin,tout:s.tout,pay:s.pay,note:s.note})));
    if(bj===aj){ skipped+=items.length; continue; }
    writeDay(U, date, finalSlots.map(s=>({type:s.type,site:s.site,venue:s.venue,tin:s.tin,tout:s.tout,pay:s.pay,note:s.note})), editorId, srcLabel);
    applied+=items.length;
  }
  return { applied, skipped, errors };
}

function toMin(t){const m=String(t==null?'':t).match(/^(\d{1,2}):(\d{2})$/);return m?Number(m[1])*60+Number(m[2]):null;}
function rangesOverlap(a,b,c,d){let s1=toMin(a),e1=toMin(b),s2=toMin(c),e2=toMin(d);if(s1==null||e1==null||s2==null||e2==null)return false;if(e1<=s1)e1+=1440;if(e2<=s2)e2+=1440;return s1<e2&&s2<e1;}
function dayConflicts(ws,meta){const out=[];const seen={};for(const s of ws){if(s.site&&seen[s.site])out.push({...meta,level:'block',kind:'duplicate',site:s.site});if(s.site)seen[s.site]=true;}for(let i=0;i<ws.length;i++)for(let j=i+1;j<ws.length;j++){const a=ws[i],b=ws[j];if(a.site&&a.site===b.site)continue;if(rangesOverlap(a.tin,a.tout,b.tin,b.tout))out.push({...meta,level:'block',kind:'overlap',a:a.site||'(現場名なし)',b:b.site||'(現場名なし)',atime:(a.tin||'?')+'-'+(a.tout||'?'),btime:(b.tin||'?')+'-'+(b.tout||'?')});}const sites=ws.filter(s=>s.site).map(s=>s.site);if(sites.length>=2&&!out.some(c=>c.kind==='overlap'))out.push({...meta,level:'warn',kind:'multi',count:sites.length,sites});return out;}
function longestStreak(dates){const ds=[...new Set(dates)].sort();let best=0,run=0,prev=null;for(const dd of ds){const t=Date.parse(dd+'T00:00:00Z');if(prev!=null&&t-prev===86400000)run++;else run=1;if(run>best)best=run;prev=t;}return best;}

      let assignments=[];
      if(Array.isArray(body.assignments)){

      let added=0,skipped=0; const conflicts=[];

          else { const others=before.filter(b=>b.type==='work'&&b.site).map(b=>b.site); if(others.length) conflicts.push({name:uname,date,level:'warn',kind:'multi',count:others.length+1,sites:[...others,site]}); }

      if(!body.name) err('名前は必須です');
      const sc=v=>{ const n=Number(v); return (n>=1&&n<=5)?n:null; };
      DB.blacklist.unshift({ id:uid('bl'), ts:jstTs(), date:body.date||jstDate(), reporter:body.reporter||M.name, name:body.name, s_talk:sc(body.s_talk), s_dress:sc(body.s_dress), s_groom:sc(body.s_groom), s_late:sc(body.s_late), s_work:sc(body.s_work), reason:body.reason||'', added_by:M.name });
      return {ok:1};
    }

    // ---- 管理者データ閲覧 ----
    if(method==='GET' && url==='/admin/data'){
      if(M.role!=='admin') notFound();
      const t=qs.get('table')||'users';
      if(t==='users') return DB.users.map(u=>({ 登録番号:u.regno, 氏名:u.name, 役割:u.role, 担当手配者:(findUser(u.manager_id)||{}).name||'', ランク:u.rank, 班:u.han, 最寄駅:u.station, パスワード状態:u.pass===null?'初期PW(登録番号のまま)':'本人が変更済み' }));
      if(t==='schedule') return DB.schedule.map(s=>({ 氏名:(findUser(s.user_id)||{}).name, 日付:s.date, 枠:s.slot, 種別:s.type, 現場名:s.site, 会場:s.venue, IN:s.tin, OUT:s.tout, 時間:s.hours, 給与:s.pay, 備考:s.note }));
      if(t==='reports') return DB.reports.map(r=>({ 日時:r.ts, 報告者:r.reporter_name, 候補者:r.candidate_name, 状態:r.status, ドラフト:r.draft, チェック者:r.checker }));
      if(t==='blacklist') return DB.blacklist.map(b=>({ 登録日時:b.ts, 日付:b.date, 報告者:b.reporter, 名前:b.name, 会話:b.s_talk, 服装:b.s_dress, 身なり:b.s_groom, 遅刻:b.s_late, 業務:b.s_work, 理由:b.reason, 登録者:b.added_by }));
      if(t==='history') return DB.history.map(x=>({ 日時:x.ts, 編集者:x.editor_name, 対象:x.target_name, 対象日:x.date }));
      if(t==='notifications') return DB.notifications.map(n=>({ 宛先:(findUser(n.user_id)||{}).name, 日時:n.ts, 種別:n.kind, 本文:n.text, 既読:n.read?'既読':'未読' }));
      return [];
    }

    // ---- 通知 ----
    if(method==='GET' && url==='/notifications'){ return DB.notifications.filter(n=>n.user_id===M.id).sort((a,b)=>b.id-a.id).slice(0,50); }
    if(method==='POST' && url==='/notifications/read'){ for(const n of DB.notifications) if(n.user_id===M.id) n.read=1; return {ok:1}; }

    err('該当するAPIがありません',404);
  } catch(e){
    // app.js は throw された Error を受け取る想定
    throw e;
  }
}

<script>
/* RB事業2課 スケジュール管理 SPA */
'use strict';
const $ = s => document.querySelector(s);
const h = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const pad = n => String(n).padStart(2, '0');
const WD = ['日','月','火','水','木','金','土'];
const ROLE_JP = { admin:'チーフ(管理者)', handler:'チーフ(手配者)', chief:'チーフ', member:'メンツ' };
function roleLabel(u){ if(u && u.suspended) return (u.role==='member'?'メンツ':'チーフ')+'(アカウント停止)'; return ROLE_JP[u.role]||u.role; }
const LV = { member:0, chief:1, handler:2, admin:3 };
const yen = n => '¥' + Number(n||0).toLocaleString();
const jstToday = () => new Date(Date.now()+9*3600e3).toISOString().slice(0,10);
// 権限不足・存在しないページの共通表示(機能名を一切見せない)
function notFound(app){ app.innerHTML = '<div class="card" style="text-align:center;padding:40px"><h2 style="border:none">ページが見つかりません</h2><div class="muted">お探しのページは存在しないか、移動した可能性があります。</div><div style="margin-top:16px"><a href="#/schedule" class="btn gold">マイスケジュールへ戻る</a></div></div>'; }

let TOKEN='';
let ME = null;
let MONTH = new Date(Date.now()+9*3600e3).toISOString().slice(0,7);
let USERS_CACHE = null;
let timers = [];

async function api(path, opt = {}) {
  try { return await window.__mockApi(path, opt || {}); }
  catch(e){ if(e&&e.status===401&&path!=='/login'){ logoutLocal(); } throw new Error(e&&e.message?e.message:'エラー'); }
}
function logoutLocal(){ TOKEN=''; ME=null; location.hash='#/login'; render(); }
function clearTimers(){ timers.forEach(clearInterval); timers=[]; }
function shiftMonth(m, d){ const [y,mm]=m.split('-').map(Number); const dt=new Date(y, mm-1+d, 1); return dt.getFullYear()+'-'+pad(dt.getMonth()+1); }
async function getUsers(force){ if(!USERS_CACHE||force) USERS_CACHE = await api('/users'); return USERS_CACHE; }

/* ===== モーダル ===== */
function modal(html){
  $('#modal-layer').innerHTML = `<div class="modal-bg"><div class="modal"><button class="close-x">✕</button>${html}</div></div>`;
  $('#modal-layer .close-x').onclick = closeModal;
  $('#modal-layer .modal-bg').onclick = e => { if(e.target.classList.contains('modal-bg')) closeModal(); };
}
function closeModal(){ $('#modal-layer').innerHTML=''; }

// 保存・更新などの完了をOKボタン付きポップアップで知らせる
function popup(message, kind){
  const icon = kind==='error' ? '⚠️' : '✅';
  const color = kind==='error' ? '#b23b3b' : '#1c7a45';
  $('#modal-layer').innerHTML = `<div class="modal-bg"><div class="modal popup-modal">
    <div class="popup-icon" style="color:${color}">${icon}</div>
    <div class="popup-msg">${h(message)}</div>
    <button class="btn gold" id="popup-ok" style="width:100%;margin-top:14px">OK</button>
  </div></div>`;
  const ok = $('#popup-ok');
  ok.focus();
  ok.onclick = closeModal;
  $('#modal-layer .modal-bg').onclick = e => { if(e.target.classList.contains('modal-bg')) closeModal(); };
}

// コンフリクト検知の確認モーダル。block(ダブルブッキング)がある場合に表示。
// 「強行して保存」=true / 「キャンセル」=false を返す Promise
// 警告(warn)件数を完了メッセージに付記
function withWarnNote(msg, r){ const w=((r&&r.conflicts)||[]).filter(c=>c.level==='warn'); return w.length ? `${msg}(注意:同日複数現場 ${w.length}件)` : msg; }
// 一括登録の保存。block(時間重複)があれば確認 → 強行時に再送して合算。キャンセルは null
async function bulkSaveWithConflicts(body){
  const r = await api('/schedule-bulk', { method:'PUT', body });
  if((r.conflicts||[]).some(c=>c.level==='block')){
    if(!(await conflictModal(r.conflicts))) return null;
    const r2 = await api('/schedule-bulk', { method:'PUT', body:{ ...body, force:true } });
    r2.added = (r.added||0) + (r2.added||0);
    return r2;
  }
  return r;
}
function conflictLine(c){
  if(c.kind==='overlap') return `<b>${h(c.name||'')}</b> <span class="cf-date">${h(c.date||'')}</span> 「${h(c.a)}」(${h(c.atime)}) と 「${h(c.b)}」(${h(c.btime)}) の<b>時間が重複</b>しています`;
  if(c.kind==='duplicate') return `<b>${h(c.name||'')}</b> <span class="cf-date">${h(c.date||'')}</span> 「${h(c.site)}」が<b>二重</b>に入っています`;
  if(c.kind==='multi') return `<b>${h(c.name||'')}</b> <span class="cf-date">${h(c.date||'')}</span> 同じ日に <b>${c.count}現場</b>(${(c.sites||[]).map(h).join('・')})`;
  return h(JSON.stringify(c));
}
function conflictModal(conflicts){
  return new Promise(resolve=>{
    const block = conflicts.filter(c=>c.level==='block');
    const warn = conflicts.filter(c=>c.level==='warn');
    const lay = document.createElement('div');
    lay.className = 'cf-layer';
    lay.innerHTML = `<div class="cf-box">
      <div class="cf-title">⚠️ コンフリクトを検知しました</div>
      ${block.length?`<div class="cf-sec"><div class="cf-h block">このまま保存するとダブルブッキングになります(${block.length}件)</div>${block.map(c=>`<div class="cf-row block">${conflictLine(c)}</div>`).join('')}</div>`:''}
      ${warn.length?`<div class="cf-sec"><div class="cf-h warn">念のため確認(${warn.length}件)</div>${warn.map(c=>`<div class="cf-row warn">${conflictLine(c)}</div>`).join('')}</div>`:''}
      <div class="cf-actions">
        <button class="btn ghost" id="cf-cancel">修正する</button>
        <button class="btn ${block.length?'danger':'gold'}" id="cf-force">${block.length?'承知のうえ強行保存':'このまま保存'}</button>
      </div></div>`;
    document.body.appendChild(lay);
    const done = v => { lay.remove(); resolve(v); };
    lay.querySelector('#cf-cancel').onclick = () => done(false);
    lay.querySelector('#cf-force').onclick = () => done(true);
    lay.addEventListener('click', e => { if(e.target===lay) done(false); });
  });
}

// 手配者モードのPIN入力(prompt()はスマホで不安定なため自前モーダル)
function openHandlerPin(){
  modal(`<h3>手配者モードに切り替え</h3>
    <div class="muted" style="margin-bottom:10px">手配者専用パスワード(PIN)を入力してください。</div>
    <input id="hp-pin" type="tel" inputmode="numeric" autocomplete="off" placeholder="PIN" style="width:100%;font-size:18px;letter-spacing:4px;text-align:center;padding:12px">
    <div id="hp-err"></div>
    <div class="row" style="margin-top:14px"><button class="btn gold" id="hp-go" style="flex:1">切り替える</button></div>`);
  const pin = $('#hp-pin'); if(pin) pin.focus();
  const go = async () => {
    const v = $('#hp-pin').value.trim();
    if(!v){ $('#hp-err').innerHTML='<div class="msg err">PINを入力してください</div>'; return; }
    try{
      await api('/handler-mode',{method:'POST',body:{pin:v}});
      ME.handler=1; closeModal(); location.hash='#/edit'; render();
    }catch(e){ $('#hp-err').innerHTML=`<div class="msg err">${h(e.message)}</div>`; }
  };
  $('#hp-go').onclick = go;
  $('#hp-pin').onkeydown = e => { if(e.key==='Enter') go(); };
}

// 現場情報モーダル(チーフ以上が閲覧、手配担当以上はメンバー追加・一括編集可)
async function openSiteModal(date, site){
  const canPay = LV[ME.role] >= 2;
  const canAdd = ME.handler === 1; // 手配者モードのときメンバー追加・編集可
  const list = await api(`/site-members?date=${date}&site=${encodeURIComponent(site)}`);
  const venue = (list.find(p => p.venue) || {}).venue || '';
  const chiefs = list.filter(p => p.role !== 'member');
  const members = list.filter(p => p.role === 'member');
  const kaTag = p => p.ka ? `<span class="ka-pill ka-${p.ka==='1課'?'1':'2'}">${p.ka}</span>` : '';
  const card = p => `<div class="dcard ka-${p.ka==='1課'?'1':'2'}">
    <div class="dcard-head"><span class="dcard-title">${h(p.name)} ${kaTag(p)}</span><span class="tag ${p.role}">${roleLabel(p)}</span></div>
    <div class="drow"><span class="dk">ランク/班</span><span class="dv">${h(p.rank)||'—'} / ${h(p.han)||'—'}</span></div>
    ${canPay&&(p.tin||p.tout)?`<div class="drow"><span class="dk">IN/OUT</span><span class="dv">${h(p.tin)}〜${h(p.tout)}</span></div>`:''}
    ${p.note?`<div class="drow"><span class="dk">備考</span><span class="dv">${h(p.note)}</span></div>`:''}
  </div>`;
  const row = p => `<tr class="ka-row-${p.ka==='1課'?'1':'2'}"><td>${h(p.name)} ${kaTag(p)}</td><td><span class="tag ${p.role}">${roleLabel(p)}</span></td><td>${h(p.rank)}</td><td>${h(p.han)}</td>${canPay?`<td>${h(p.tin)}</td><td>${h(p.tout)}</td>`:''}<td>${h(p.note)}</td></tr>`;
  const tbl = arr => `<table class="list pc-only"><tr><th>氏名</th><th>役割</th><th>ランク</th><th>班</th>${canPay?'<th>IN</th><th>OUT</th>':''}<th>備考</th></tr>${arr.map(row).join('')}</table>
    <div class="cards sp-only">${arr.map(card).join('')}</div>`;
  modal(`<h3>現場情報</h3>
    <dl class="kv">
      <dt>現場名</dt><dd><b>${h(site)}</b></dd>
      <dt>会場</dt><dd>${venue ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(venue)}" target="_blank">${h(venue)}</a>` : '<span class="muted">未登録</span>'}</dd>
      <dt>日付</dt><dd>${h(date)}</dd>
      <dt>人数</dt><dd>チーフ・手配 ${chiefs.length}名 / メンツ ${members.length}名(計${list.length}名)</dd>
    </dl>
    ${list.length ? `
      <div class="section-label" style="margin-top:6px">チーフ・手配チーム</div>
      ${chiefs.length ? tbl(chiefs) : '<div class="muted" style="padding:4px 2px">登録されていません</div>'}
      <div class="section-label" style="margin-top:12px">メンツ</div>
      ${members.length ? tbl(members) : '<div class="muted" style="padding:4px 2px">登録されていません</div>'}
    ` : '<div class="muted">この日・この現場に入っているメンバーはいません</div>'}
    ${canAdd ? `<div id="site-add-wrap" style="margin-top:16px;border-top:1px solid var(--line);padding-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn gold" id="site-add-btn">＋ メンバーを追加</button>
      ${list.length?`<button class="btn ghost" id="site-edit-btn">✏️ 既存メンバーを一括編集</button>`:''}
    </div>` : ''}`);
  if(canAdd){
    $('#site-add-btn').onclick = () => openSiteAdd(date, site, venue, (list.find(p=>p.tin)||{}).tin || '', (list.find(p=>p.tout)||{}).tout || '');
    const eb = $('#site-edit-btn');
    if(eb) eb.onclick = () => openSiteBulkEdit(date, site, venue, list);
  }
}

// 現場の既存メンバーを一括編集(IN/OUT/会場/備考をまとめて変更、個別に外す)
async function openSiteBulkEdit(date, site, venue, list){
  const def = { tin:(list.find(p=>p.tin)||{}).tin||'', tout:(list.find(p=>p.tout)||{}).tout||'' };
  modal(`<h3>既存メンバーを一括編集</h3>
    <div class="muted" style="margin-bottom:8px"><b>${h(site)}</b>${venue?` / ${h(venue)}`:''} / ${h(date)}</div>
    <div class="be-note muted" style="margin-bottom:10px">空欄の項目は変更しません。チェックを外した人はこの現場から削除します。</div>
    <div class="form-grid" style="grid-template-columns:70px 1fr;max-width:420px">
      <label>現場名</label><input id="be-site" value="${h(site)}" placeholder="変更する場合のみ">
      <label>会場</label><input id="be-venue" value="${h(venue)}" placeholder="変更する場合のみ">
      <label>IN</label><input id="be-in" value="${h(def.tin)}" placeholder="例:9:00(全員に適用)">
      <label>OUT</label><input id="be-out" value="${h(def.tout)}" placeholder="例:18:00(全員に適用)">
    </div>
    <div class="section-label" style="margin-top:12px">対象メンバー(${list.length}名)</div>
    <div id="be-list" style="max-height:46vh;overflow:auto;margin-top:6px">
      ${list.map((p,i)=>`<label class="be-item ka-${p.ka==='1課'?'1':'2'}" style="display:flex;align-items:center;gap:8px;padding:7px 8px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px">
        <input type="checkbox" class="be-chk" data-uid="${p.uid}" checked>
        <span style="flex:1"><b>${h(p.name)}</b> ${p.ka?`<span class="ka-pill ka-${p.ka==='1課'?'1':'2'}">${p.ka}</span>`:''} <span class="muted">${h(p.rank)} ${h(p.han)}</span></span>
        <span class="muted" style="font-size:12px">${h(p.tin)||'—'}〜${h(p.tout)||'—'}</span>
      </label>`).join('')}
    </div>
    <div class="row" style="margin-top:14px"><button class="btn gold" id="be-save" style="flex:1">変更を保存</button></div>`);
  $('#be-save').onclick = async () => {
    const siteNew=$('#be-site').value.trim();
    const venueNew=$('#be-venue').value.trim(), tin=$('#be-in').value.trim(), tout=$('#be-out').value.trim();
    const keep=[], remove=[];
    document.querySelectorAll('.be-chk').forEach(c=>{ (c.checked?keep:remove).push(Number(c.dataset.uid)); });
    if(!siteNew){ popup('現場名は空にできません','error'); return; }
    try{
      const r = await api('/site-edit',{method:'PUT',body:{ date, site, keepUids:keep, removeUids:remove,
        newSite:siteNew, venue:venueNew, tin, tout }});
      closeModal();
      popup(`${r.updated||0}名を更新${r.removed?` / ${r.removed}名を削除`:''}しました。`);
      if(typeof pageSites==='function' && location.hash.startsWith('#/sites')){ const app=document.getElementById('app'); pageSites(app); }
      else render();
    }catch(e){ popup(e.message,'error'); }
  };
}

// 現場にメンバー追加(一括登録と同じ:複数人・人ごとに複数日)
async function openSiteAdd(date, site, venue, tin, tout){
  const [users, managers] = await Promise.all([getUsers(true), api('/managers')]);
  modal(`<h3>現場にメンバーを追加</h3>
    <div class="muted" style="margin-bottom:8px"><b>${h(site)}</b>${venue?` / ${h(venue)}`:''}</div>
    <div class="form-grid" style="grid-template-columns:70px 1fr">
      <label>IN</label><input id="sa-in" value="${h(tin)}" placeholder="9:00">
      <label>OUT</label><input id="sa-out" value="${h(tout)}" placeholder="18:00">
    </div>
    <div style="margin-top:12px">
      <label class="bulk-label">① メンバーを追加(同じ手配担当だけ)</label>
      <div class="row" style="gap:6px;margin:6px 0">
        <select id="sa-mgr" class="nowrap" style="flex:1"><option value="">▼ 担当手配者</option>
          ${managers.map(m=>`<option value="${m.id}">${h(m.name)}手配(${m.count}名)</option>`).join('')}
          <option value="__none">担当未設定</option></select>
        <select id="sa-memsel" class="nowrap" style="flex:1"><option value="">担当を選択</option></select>
        <button class="btn ghost sm" id="sa-mem-add">＋追加</button>
      </div>
    </div>
    <div style="margin-top:8px"><label class="bulk-label">② メンバーごとに日付・備考</label>
      <div id="sa-assign" style="margin-top:6px"><div class="muted">メンバーを追加してください</div></div></div>
    <div class="row" style="margin-top:14px"><button class="btn gold" id="sa-save">追加する</button></div>`);
  let asg = [];
  const def1 = date;
  $('#sa-mgr').onchange = () => {
    const mid = $('#sa-mgr').value; let list=[];
    if(mid==='__none') list=users.filter(u=>!u.manager_id);
    else if(mid) list=users.filter(u=>String(u.manager_id)===String(mid));
    $('#sa-memsel').innerHTML = list.length ? '<option value="">メンバー選択</option>'+list.map(u=>`<option value="${u.id}">${h(u.name)}(${h(u.regno)})</option>`).join('') : '<option value="">該当なし</option>';
  };
  const sync = () => { document.querySelectorAll('#sa-assign .bk-note-input').forEach(inp=>{ const ai=Number(inp.dataset.ai); if(asg[ai]) asg[ai].note=inp.value; }); };
  const renderA = () => {
    const box=$('#sa-assign');
    if(!asg.length){ box.innerHTML='<div class="muted">メンバーを追加してください</div>'; return; }
    box.innerHTML = asg.map((a,ai)=>`<div class="bk-person" data-ai="${ai}">
      <div class="bk-person-head"><b>${h(a.name)}</b><span class="bulk-sub">${h(a.regno)}</span><button class="bk-person-del" data-ai="${ai}">削除</button></div>
      <div class="row" style="gap:6px"><input type="date" class="bk-d-input" data-ai="${ai}"><button class="btn ghost xs bk-d-add" data-ai="${ai}">＋日付</button></div>
      <div class="bulk-chips" style="margin-top:6px">${a.dates.map((d,di)=>`<span class="chip">${d}<button data-ai="${ai}" data-di="${di}">✕</button></span>`).join('')||'<span class="muted">日付未選択</span>'}</div>
      <div class="row" style="margin-top:6px"><label style="flex:0 0 44px;font-size:13px;color:#555">備考</label><input class="bk-note-input" data-ai="${ai}" value="${h(a.note)}" placeholder="備考(例:物販頭)" style="flex:1"></div>
    </div>`).join('');
    box.querySelectorAll('.bk-d-add').forEach(btn=>btn.onclick=()=>{ const ai=Number(btn.dataset.ai),inp=box.querySelector(`.bk-d-input[data-ai="${ai}"]`); const v=inp.value; if(!v)return; if(!asg[ai].dates.includes(v)){asg[ai].dates.push(v);asg[ai].dates.sort();} sync(); renderA(); });
    box.querySelectorAll('.chip button').forEach(b=>b.onclick=()=>{ sync(); asg[Number(b.dataset.ai)].dates.splice(Number(b.dataset.di),1); renderA(); });
    box.querySelectorAll('.bk-person-del').forEach(b=>b.onclick=()=>{ sync(); asg.splice(Number(b.dataset.ai),1); renderA(); });
  };
  $('#sa-mem-add').onclick = () => {
    const v=$('#sa-memsel').value; if(!v) return;
    if(asg.some(a=>a.uid===Number(v))){ popup('既に追加されています','error'); return; }
    const u=users.find(x=>x.id===Number(v)); if(!u) return;
    sync(); asg.push({uid:u.id,name:u.name,regno:u.regno,dates:[def1],note:''}); renderA();

  $('#sa-save').onclick = async () => {
    sync();
    const assignments = asg.filter(a=>a.dates.length).map(a=>({uid:a.uid,dates:a.dates,note:a.note}));
    if(!assignments.length){ popup('メンバーと日付を指定してください','error'); return; }
    try{
      const r = await bulkSaveWithConflicts({ assignments, site, venue, tin:$('#sa-in').value.trim(), tout:$('#sa-out').value.trim() });
      if(!r) return;
      popup(withWarnNote(`${r.added}名分を現場に追加しました${r.skipped?`(${r.skipped}件はスキップ)`:''}。`, r));
    }catch(e){ popup(e.message,'error'); }
  };
  renderA();
}

/* ===== ルーティング ===== */
window.addEventListener('hashchange', () => {
  // マイ/他メンバーのスケジュールを開いたときは常に今月から表示(月送りは画面内で行うため hashchange は発火しない)
  if((location.hash||'').startsWith('#/schedule')) MONTH = jstToday().slice(0,7);
  render();
});
window.addEventListener('load', render);

async function render(){
  clearTimers(); closeModal();
  if(!TOKEN){ renderLogin(); return; }
  if(!ME){
    try{ ME = await api('/me'); } catch(e){ renderLogin(e.message); return; }
  }
  const hash = location.hash || '#/schedule';
  renderShell(hash);
  const app = $('#app');
  try{
    if(hash.startsWith('#/schedule')) await pageSchedule(app, hash);
    else if(hash === '#/members') await pageMembers(app);
    else if(hash === '#/sites') await pageSites(app);
    else if(hash === '#/summary') await pageSummary(app);
    else if(hash === '#/edit') await pageEdit(app);
    else if(hash === '#/report') pageReportForm(app);
    else if(hash === '#/reports') await pageReports(app);
    else if(hash === '#/draft') await pageDraft(app);
    else if(hash === '#/blacklist') await pageBlacklist(app);
    else if(hash === '#/handler') await pageHandler(app);
    else if(hash === '#/admin') await pageAdmin(app);
    else if(hash === '#/password') pagePassword(app);
    else { location.hash='#/schedule'; }
  }catch(e){ app.innerHTML = `<div class="msg err">${h(e.message)}</div>`; }
  pollBell();
}

  document.getElementById('root').innerHTML = `
  <div class="login-wrap"><div class="login-card">
    <h1>RB事業2課</h1><div class="sub">SCHEDULE MANAGEMENT</div>
    ${err?`<div class="msg err">${h(err)}</div>`:''}

    <div id="l-err"></div>
    <div class="hint">初期パスワードは登録番号と同じです</div>
  </div></div>`;
  const go = async () => {
    try{
      const d = await api('/login', { method:'POST', body:{ regno:$('#l-regno').value.trim(), password:$('#l-pw').value } });

  const links = [
    ['#/schedule','📅 マイスケジュール', true],

  <header>
    <button class="menu-btn" id="menu-btn" aria-label="メニュー">☰</button>

    <div class="hright">
      <button class="bell" id="bell">🔔<span class="badge" id="bcount" style="display:none"></span></button>
      <span class="uname">${h(ME.name)}<br><span style="color:var(--gold)">${roleLabel(ME)}${ME.handler?'(手配モード)':''}</span></span>
    </div>
  </header>
  <main id="app"><div class="muted">読み込み中…</div></main>
  <div id="dd"></div>
  <div id="menu-drawer"></div>`;

  $('#menu-btn').onclick = () => {
    const dr = $('#menu-drawer');

    dr.innerHTML = `<div class="drawer-bg" id="drawer-bg"></div>
      <nav class="drawer">
        <div class="drawer-head">メニュー</div>
        ${links.map(l=>`<button type="button" class="drawer-link ${hash.startsWith(l[0])?'active':''}" data-go="${l[0]}">${l[1]}</button>`).join('')}

        <button type="button" class="drawer-link" data-go="#/password">🔑 パスワード変更</button>
        ${isHandler ? `<button type="button" class="drawer-link" id="dd-handler">🛠️ 手配者専用ページ</button>` : ''}
        ${ME.handler===1 ? `<button type="button" class="drawer-link" id="dd-exit">🔓 手配者モードを終了</button>` : ''}
        <button type="button" class="drawer-link danger" id="dd-logout">↩️ ログアウト</button>
      </nav>`;
    const close = () => dr.innerHTML='';
    $('#drawer-bg').onclick = close;
    // 画面移動:hashを変える。同じhashのときだけ明示render(hashchangeが出ないため)
    dr.querySelectorAll('.drawer-link[data-go]').forEach(btn => btn.onclick = () => {
      const to = btn.dataset.go;
      close();
      if(location.hash === to){ render(); } else { location.hash = to; }
    });
    const dh = $('#dd-handler');
    if(dh) dh.onclick = () => {
      close();
      if(ME.handler===1){ location.hash='#/handler'; render(); return; }
      openHandlerPin();
    };
    const de = $('#dd-exit');
    if(de) de.onclick = async () => { await api('/handler-mode',{method:'DELETE'}); ME.handler=0; close(); location.hash='#/schedule'; render(); };
    $('#dd-logout').onclick = async () => { try{ await api('/logout',{method:'POST'}); }catch(_){} logoutLocal(); };

  $('#bell').onclick = async () => {

      <div class="notif-list">${d.items.length ? d.items.map(n=>`

      ${d.unread ? '<button id="dd-read" class="sep">すべて既読にする</button>' : ''}
    </div>`;
    const dr2 = $('#dd-read');

  };
}

async function pollBell(){
  const upd = async () => {
    try{ const d = await api('/notifications'); const b = $('#bcount');
      if(!b) return;
      b.style.display = d.unread ? '' : 'none'; b.textContent = d.unread;
    }catch(_){}
  };
  upd();
  timers.push(setInterval(upd, 45000));
}

/* ===== スケジュール表(写真風)===== */
async function pageSchedule(app, hash){
  const m = hash.match(/^#\/schedule\/(\d+)/);
  const uid = m ? Number(m[1]) : ME.id;
  const d = await api(`/schedule?uid=${uid}&month=${MONTH}`);
  const u = d.user;
  const [y, mo] = MONTH.split('-').map(Number);
  const days = new Date(y, mo, 0).getDate();
  const rookieMap = {};
  for(const r of d.rookies||[]) (rookieMap[r.next_date+'|'+r.next_site] ||= []).push(r.candidate_name);

  let workDays=0, offDays=0, sumH=0, sumOT=0, sumPay=0, rows='', mrows='';
  const today = jstToday(); // 今日(YYYY-MM-DD)。該当日を強調表示する
  const canPlan = LV[ME.role] >= 1; // チーフ以上は育成計画を編集可
  const canPay = d.canSeePay;       // 手配担当以上のみ 時間・給与・IN・OUT を閲覧可
  const plans = d.plans || {};
  const multi = arr => arr.map(x=>h(x||'')||'&nbsp;').join('<br>'); // 複数現場を改行で重ねる
  // 育成計画セル(日単位)
  const planCell = (date) => {
    const pv = plans[date] || '';
    return `<td class="plan-cell" data-date="${date}" data-plan="${h(pv)}" title="${canPlan?'タップで育成計画を編集':''}">${h(pv)}${canPlan?' <span class="plan-edit">✎</span>':''}</td>`;
  };
  for(let i=1;i<=days;i++){
    const date = `${MONTH}-${pad(i)}`;
    const w = new Date(y, mo-1, i).getDay();
    const list = d.entries[date]; // 配列 or undefined
    const wdCls = w===0?'sun':w===6?'sat':'';
    const planVal = plans[date] || '';
    let cells, mBody='', mCls='';   // mBody=スマホ用の内容, mCls=行の種別クラス
    if(!list || !list.length){
      cells = `<td></td><td></td>${canPay?'<td></td><td></td><td></td><td></td><td></td>':''}<td></td>${planCell(date)}`;
      mCls = 'm-empty';
      mBody = `<span class="m-none">予定なし</span>`;
    } else if(list[0].type==='work'){
      // 現場(複数可)
      workDays++;
      const sites=[], venues=[], dutys=[], tins=[], touts=[], hrs=[], ots=[], pays=[], notes=[];
      const mSites=[];
      for(const e of list){
        sumH+=e.hours; sumOT+=e.overtime; sumPay+=e.pay;
        const rk = (LV[ME.role]>=1 ? (rookieMap[date+'|'+e.site]||[]) : []).map(n=>`<span class="rookie-badge">🔰${h(n)}</span>`).join('');
        sites.push(`<span class="site-cell" data-date="${date}" data-site="${h(e.site)}" title="タップで同じ現場のメンバーを表示">${h(e.site)}${rk}</span>`);
        venues.push(`<span class="venue-cell" data-venue="${h(e.venue)}" title="タップでGoogleマップ">${h(e.venue)}</span>`);
        dutys.push(e.duty?h(e.duty):'<span class="muted">—</span>');
        tins.push(h(e.tin)); touts.push(h(e.tout));
        hrs.push(e.hours?e.hours.toFixed(2):''); ots.push(e.overtime?e.overtime.toFixed(2):'');
        pays.push(e.pay?e.pay.toLocaleString():''); if(e.note) notes.push(e.note);
        // スマホ用:1現場ぶんのブロック
        const dutyPart = canPay && e.duty ? `<div class="m-line"><span class="m-k">業務</span><span class="m-v">${h(e.duty)}</span></div>` : '';
        const timePart = canPay && (e.tin||e.tout) ? `<div class="m-line"><span class="m-k">時間</span><span class="m-v">${h(e.tin)}〜${h(e.tout)}${e.hours?`(${e.hours.toFixed(1)}h)`:''}</span></div>` : '';
        const payPart = canPay && e.pay ? `<div class="m-line"><span class="m-k">給与</span><span class="m-v">${yen(e.pay)}${e.overtime?` / 残業${e.overtime.toFixed(2)}h`:''}</span></div>` : '';
        const notePart = e.note ? `<div class="m-line"><span class="m-k">備考</span><span class="m-v">${h(e.note)}</span></div>` : '';
        mSites.push(`<div class="m-site">
          <div class="m-sitename"><span class="site-cell" data-date="${date}" data-site="${h(e.site)}">${h(e.site)}</span>${rk}</div>
          ${e.venue?`<div class="m-line"><span class="m-k">会場</span><span class="m-v"><span class="venue-cell" data-venue="${h(e.venue)}">${h(e.venue)}</span></span></div>`:''}
          ${dutyPart}${timePart}${payPart}${notePart}
        </div>`);
      }
      const payPart = canPay ? `<td class="c duty-col">${dutys.join('<br>')}</td><td class="c">${tins.join('<br>')}</td><td class="c">${touts.join('<br>')}</td>
        <td class="r">${hrs.join('<br>')}</td><td class="r">${ots.join('<br>')}</td><td class="r">${pays.join('<br>')}</td>` : '';
      cells = `<td class="site-multi">${sites.join('<br>')}</td><td class="venue-multi">${venues.join('<br>')}</td>
        ${payPart}<td class="note-cell">${multi(notes.length?notes:[''])}</td>${planCell(date)}`;
      mCls = 'm-work';
      mBody = mSites.join('');
    } else {
      const e = list[0];
      const label = e.type==='off'?'休暇':e.type==='paid'?'有給休暇':e.type==='ok'?'1日OK':'×';
      if(e.type==='off'||e.type==='paid') offDays++;
      sumH+=e.hours||0; sumPay+=e.pay||0;
      const payPart = canPay ? `<td></td><td class="c">${h(e.tin)}</td><td class="c">${h(e.tout)}</td>
        <td class="r">${e.hours?e.hours.toFixed(2):''}</td><td></td><td class="r">${e.pay?e.pay.toLocaleString():''}</td>` : '';
      cells = `<td class="off-cell off-${e.type}">${label}</td><td></td>${payPart}<td class="note-cell">${h(e.note||'')}</td>${planCell(date)}`;
      mCls = 'm-off m-'+e.type;
      mBody = `<span class="m-off-label">${label}</span>${e.note?`<div class="m-line"><span class="m-k">備考</span><span class="m-v">${h(e.note)}</span></div>`:''}`;
    }
    rows += `<tr class="${date===today?'is-today':''}"><td class="day">${i}${date===today?'<span class="today-pill">今日</span>':''}</td><td class="wd ${wdCls}">${WD[w]}</td>${cells}</tr>`;
    // スマホ用 日リスト行(育成は:予定がある日、または既に入力済みの日のみ表示)
    const hasContent = !!(list && list.length);
    const showPlan = canPlan && (hasContent || planVal);
    const planM = showPlan ? `<div class="m-line m-plan" data-date="${date}" data-plan="${h(planVal)}"><span class="m-k">育成</span><span class="m-v">${h(planVal)||'<span class="muted">（未入力）</span>'}${canPlan?' <span class="plan-edit">✎</span>':''}</span></div>` : '';
    mrows += `<div class="m-day ${mCls} ${date===today?'is-today':''}">
      <div class="m-date ${wdCls}"><span class="m-dnum">${i}</span><span class="m-dwd">${WD[w]}</span>${date===today?'<span class="today-pill">今日</span>':''}</div>
      <div class="m-content">${mBody}${planM}</div>
    </div>`;
  }

  const others = LV[ME.role]>=1 ? `<button class="btn ghost sm" id="pick-user">他のメンバーを見る ▾</button>` : '';
  app.innerHTML = `
  <h2>${h(u.name)} のスケジュール ${uid!==ME.id?'<span class="muted">(閲覧中)</span>':''}</h2>
  <div class="card">
    <div class="row" style="justify-content:space-between">
      <div class="month-nav">
        <button class="btn ghost sm" id="prev-m">◀</button>
        <div class="mtitle">${y}年 ${mo}月</div>
        <button class="btn ghost sm" id="next-m">▶</button>
      </div>
      <div class="muted">${h(u.regno)} / ${h(u.rank)} / ${h(u.han)} / ${h(u.station)}</div>
      ${others}
    </div>
    <div class="sched-wrap pc-only">
      <table class="sched">
        <thead><tr><th>日</th><th>曜</th><th>現場名</th><th>会場</th>${canPay?'<th>業務</th><th>IN</th><th>OUT</th><th>時間</th><th>時間外</th><th>給与</th>':''}<th>備考</th><th>育成計画</th></tr></thead>
        <tbody>${rows}
        <tr class="total-row">
          <td colspan="2" class="c">合計</td>
          <td>現場日数 ${workDays}日</td>
          <td>休暇日数 ${offDays}日</td>
          ${canPay?`<td></td><td colspan="2" class="c red-num">${sumH.toFixed(1)}時間</td>
          <td class="c red-num">残業${sumOT.toFixed(2)}h</td>
          <td colspan="2" class="r red-num">${yen(sumPay)}</td>`:''}
          <td></td><td></td>
        </tr></tbody>
      </table>
    </div>
    <div class="sched-mobile sp-only">
      ${mrows}
      <div class="m-total">
        <div>現場 <b>${workDays}</b>日 / 休暇 <b>${offDays}</b>日</div>
        ${canPay?`<div>合計 <b class="red-num">${sumH.toFixed(1)}時間</b>(残業${sumOT.toFixed(2)}h)</div><div>給与 <b class="red-num">${yen(sumPay)}</b></div>`:''}
      </div>
    </div>
    <div class="muted" style="margin-top:8px">${canPay?'現場名タップ → 同じ現場のメンバー・備考':'現場名タップ → 同じ現場のメンバー'} / 会場タップ → Googleマップ${canPlan?' / 育成計画をタップ → 編集(チーフ以上)':''}</div>
  </div>`;

  $('#prev-m').onclick = () => { MONTH = shiftMonth(MONTH,-1); render(); };
  $('#next-m').onclick = () => { MONTH = shiftMonth(MONTH, 1); render(); };
  const pk = $('#pick-user');
  if(pk) pk.onclick = async () => {
    const [users, managers] = await Promise.all([getUsers(true), api('/managers')]);
    modal(`<h3>メンバーを選択</h3>
      <div class="form-grid" style="grid-template-columns:120px 1fr;max-width:460px">
        <label>担当手配者</label>
        <select id="mp-mgr"><option value="">▼ 選択してください</option>
          ${managers.map(m=>`<option value="${m.id}">${h(m.name)}手配(${m.count}名)</option>`).join('')}
          <option value="__none">担当未設定</option>
          <option value="__all">全員から選ぶ</option>
        </select>
        <label>メンバー</label>
        <select id="mp-mem" disabled><option>担当手配者を選んでください</option></select>
      </div>
      <div class="row" style="margin-top:14px"><button class="btn gold" id="mp-go" disabled>表示する</button></div>`);
    const fill = () => {
      const mid = $('#mp-mgr').value;
      let list;
      if(mid==='') { $('#mp-mem').innerHTML='<option>担当手配者を選んでください</option>'; $('#mp-mem').disabled=true; $('#mp-go').disabled=true; return; }
      if(mid==='__all') list = users;
      else if(mid==='__none') list = users.filter(u=>!u.manager_id);
      else list = users.filter(u=>String(u.manager_id)===String(mid));
      if(!list.length){ $('#mp-mem').innerHTML='<option value="">(該当メンバーなし)</option>'; $('#mp-mem').disabled=true; $('#mp-go').disabled=true; return; }
      $('#mp-mem').disabled=false; $('#mp-go').disabled=false;
      $('#mp-mem').innerHTML = list.map(u=>`<option value="${u.id}">${h(u.name)}(${h(u.regno)})</option>`).join('');
    };
    $('#mp-mgr').onchange = fill;
    $('#mp-go').onclick = () => { const v=$('#mp-mem').value; if(v){ closeModal(); location.hash='#/schedule/'+v; } };
  };

  app.querySelectorAll('.venue-cell').forEach(td => td.onclick = () => {
    if(td.dataset.venue) window.open('https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(td.dataset.venue),'_blank');
  });
  if(canPlan){
    app.querySelectorAll('.plan-cell, .m-plan').forEach(td => td.onclick = async (ev) => {
      ev.stopPropagation();
      const v = prompt(`${u.name} さん ${td.dataset.date} の育成計画`, td.dataset.plan || '');
      if(v==null) return;
      try{
        await api('/schedule-plan', { method:'PUT', body:{ uid, date: td.dataset.date, plan: v } });
        render();
      }catch(e){ alert(e.message); }
    });
  }
  app.querySelectorAll('.site-cell').forEach(td => td.onclick = (ev) => { ev.stopPropagation(); openSiteModal(td.dataset.date, td.dataset.site); });

  // 手配者モード中:日付(行)タップで、このメンバーのその日に現場を追加/編集
  if(ME.handler === 1){
    const openDayEdit = (date) => openMemberDayEdit(uid, u, date);
    // PC:行の日・曜・備考など(現場名セル以外)をタップ
    app.querySelectorAll('table.sched tbody tr').forEach(tr => {
      if(tr.classList.contains('total-row')) return;
      const dcell = tr.querySelector('td.day');
      if(!dcell) return;
      const dnum = dcell.textContent.trim();
      const date = `${MONTH}-${pad(Number(dnum))}`;
      tr.classList.add('editable-row');
      tr.querySelectorAll('td').forEach(td => {
        if(td.classList.contains('site-multi')||td.classList.contains('plan-cell')) return;
        td.style.cursor='pointer';
        td.addEventListener('click', (ev)=>{ if(ev.target.closest('.venue-cell'))return; openDayEdit(date); });
      });
    });
    // スマホ:日カードタップ
    app.querySelectorAll('.sched-mobile .m-day').forEach((md,idx) => {
      const date = `${MONTH}-${pad(idx+1)}`;
      md.classList.add('editable-row');
      md.addEventListener('click', (ev)=>{
        if(ev.target.closest('.site-cell')||ev.target.closest('.venue-cell')||ev.target.closest('.m-plan'))return;
        openDayEdit(date);
      });
    });
    const hint = document.createElement('div');
    hint.className='muted'; hint.style.marginTop='6px';
    hint.innerHTML='🛠 手配者モード:日付の行をタップ → この人のその日の現場を追加・編集できます';
    app.querySelector('.card').appendChild(hint);
  }
}

// 手配者モード:特定メンバーの特定日の現場を追加・編集
const DUTIES = ['案内','受付・案内','準備','本部付','制作補助','運営補助','雑務','準備・設営','搬入','搬出','機材搬入','機材搬出','ステージハンド','搬入・案内','案内・搬出','パッケージ','ケータリング','物品販売'];
function isLockedDate(date){ const d=new Date(Date.now()+9*3600e3); d.setDate(d.getDate()-14); return String(date) <= d.toISOString().slice(0,10); }

async function openMemberDayEdit(uid, u, date){
  if(ME.handler !== 1){ return; }
  if(isLockedDate(date)){ modal(`<h3>${h(u.name)} さん / ${h(date)}</h3><div class="msg" style="background:#fff6e5;border:1px solid #f0dca8;color:#8a5a00;padding:12px;border-radius:8px">この日は<b>給与確定済み</b>（現場日から2週間経過）のため編集できません。</div><div class="row" style="margin-top:12px"><button class="btn ghost" onclick="closeModal()">閉じる</button></div>`); return; }
  // その日の既存スロットを取得
  let existing = [];
  try{
    const d = await api(`/schedule?uid=${uid}&month=${date.slice(0,7)}`);
    existing = (d.entries && d.entries[date]) ? d.entries[date].filter(e=>e.type==='work') : [];
  }catch(e){}
  const slotRow = (s={}, i=0) => `<div class="md-slot" data-i="${i}">
    <div class="form-grid" style="grid-template-columns:64px 1fr;gap:6px 8px">
      <label>現場名</label><input class="md-site" value="${h(s.site||'')}" placeholder="例:NiziU">
      <label>会場</label><input class="md-venue" value="${h(s.venue||'')}" placeholder="例:京セラドーム大阪">
      <label>業務名</label><select class="md-duty">${DUTIES.map(d=>`<option ${String(s.duty||'案内')===d?'selected':''}>${d}</option>`).join('')}</select>
      <label>IN</label><input class="md-in" value="${h(s.tin||'')}" placeholder="9:00">
      <label>OUT</label><input class="md-out" value="${h(s.tout||'')}" placeholder="18:00">
      <label>搬入終了</label><input class="md-le" value="${h(s.load_end||'')}" placeholder="任意 例:10:30">
      <label>終演</label><input class="md-se" value="${h(s.show_end||'')}" placeholder="任意 例:20:00">
      <label>手当</label><label style="font-weight:400;font-size:13px;display:flex;align-items:center;gap:6px"><input type="checkbox" class="md-multi" ${s.multi?'checked':''} style="width:auto"> 2st(複数回公演 +¥500)</label>
      <label>備考</label><input class="md-note" value="${h(s.note||'')}" placeholder="例:物販頭">
    </div>
    <button class="btn ghost xs md-del" data-i="${i}">この現場を削除</button>
  </div>`;
  modal(`<h3>${h(u.name)} さん / ${h(date)}</h3>
    <div class="muted" style="margin-bottom:8px">この日の現場を追加・編集します(複数可)。業務名で給与が自動計算されます。</div>
    <div id="md-slots">${(existing.length?existing:[{}]).map((s,i)=>slotRow(s,i)).join('')}</div>
    <button class="btn ghost sm" id="md-add" style="margin-top:8px">＋ 現場をもう一つ追加</button>
    <div class="row" style="margin-top:14px;gap:8px">
      <button class="btn gold" id="md-save" style="flex:1">保存する</button>
    </div>
    <div class="row" style="margin-top:8px;gap:6px;align-items:center;flex-wrap:wrap">
      <span class="muted" style="font-size:12px">またはこの日を:</span>
      <button class="btn ghost sm md-status" data-t="ok">1日OK</button>
      <button class="btn ghost sm md-status" data-t="off">休暇</button>
      <button class="btn ghost sm md-status" data-t="paid">有給</button>
      <button class="btn ghost sm md-status" data-t="x">×</button>
    </div>`);
  let idx = existing.length || 1;
  const bind = () => {
    document.querySelectorAll('#md-slots .md-del').forEach(b=>b.onclick=()=>{
      const slots=document.querySelectorAll('#md-slots .md-slot');
      if(slots.length<=1){ b.closest('.md-slot').querySelectorAll('input').forEach(i=>i.value=''); return; }
      b.closest('.md-slot').remove();
    });
  };
  bind();
  $('#md-add').onclick = () => { const div=document.createElement('div'); div.innerHTML=slotRow({},idx++); $('#md-slots').appendChild(div.firstElementChild); bind(); };
  $('#md-save').onclick = async () => {
    const slots=[];
    document.querySelectorAll('#md-slots .md-slot').forEach(s=>{
      const site=s.querySelector('.md-site').value.trim();
      if(!site) return;
      slots.push({type:'work',site,venue:s.querySelector('.md-venue').value.trim(),
        tin:s.querySelector('.md-in').value.trim(),tout:s.querySelector('.md-out').value.trim(),
        duty:s.querySelector('.md-duty').value,
        load_end:s.querySelector('.md-le').value.trim(),
        show_end:s.querySelector('.md-se').value.trim(),
        multi:s.querySelector('.md-multi').checked?1:0,
        note:s.querySelector('.md-note').value.trim()});
    });
    if(!slots.length){ popup('現場名を入力してください','error'); return; }
    try{
      let r = await api('/schedule',{method:'PUT',body:{uid,date,slots}});
      if(r.ok===0 && r.conflicts){
        if(!(await conflictModal(r.conflicts))) return;
        r = await api('/schedule',{method:'PUT',body:{uid,date,slots,force:true}});
      }
      closeModal(); popup(withWarnNote('保存しました', r)); render();
    }catch(e){ popup(e.message,'error'); }
  };
  document.querySelectorAll('.md-status').forEach(b=>b.onclick = async () => {
    const t=b.dataset.t, lbl={ok:'1日OK',off:'休暇',paid:'有給',x:'×'}[t];
    try{
      await api('/schedule',{method:'PUT',body:{uid,date,slots:[{type:t}]}});
      closeModal(); popup(lbl+'に設定しました'); render();
    }catch(e){ popup(e.message,'error'); }
  });
}

/* ===== 現場一覧(チーフ以上)===== */
async function pageSites(app){
  if(LV[ME.role] < 1){ notFound(app); return; }
  if(!app._month) app._month = MONTH;
  const month = app._month;
  const sites = await api(`/sites?month=${month}`);
  // 日付ごとにグループ化
  const byDate = {};
  for(const s of sites){ (byDate[s.date] ||= []).push(s); }
  const dates = Object.keys(byDate).sort();
  const [y,mo] = month.split('-').map(Number);
  app.innerHTML = `
  <h2>現場一覧</h2>
  <div class="card">
    <div class="row" style="margin-bottom:12px;align-items:center">
      <button class="btn ghost sm" id="st-prev">◀</button>
      <b style="min-width:110px;text-align:center">${y}年 ${mo}月</b>
      <button class="btn ghost sm" id="st-next">▶</button>
      ${ME.handler===1 ? '<span class="muted" style="margin-left:auto">現場をタップ → メンバー確認・追加</span>' : '<span class="muted" style="margin-left:auto">現場をタップ → メンバー確認</span>'}
    </div>
    ${dates.length ? dates.map(date=>{
      const w = new Date(date.slice(0,4), Number(date.slice(5,7))-1, Number(date.slice(8,10))).getDay();
      return `<div class="st-day">
        <div class="st-date ${w===0?'sun':w===6?'sat':''}">${Number(date.slice(8,10))}日(${WD[w]})</div>
        <div class="st-sites">
          ${byDate[date].map(s=>`<button class="st-site" data-date="${s.date}" data-site="${h(s.site)}">
            <span class="st-site-name">${h(s.site)}</span>
            ${s.venue?`<span class="st-site-venue">${h(s.venue)}</span>`:''}
            <span class="st-site-cnt">${s.cnt}名</span>
          </button>`).join('')}
        </div>
      </div>`;
    }).join('') : '<div class="muted" style="padding:20px 0;text-align:center">この月に登録された現場はありません</div>'}
  </div>`;
  $('#st-prev').onclick = () => { app._month = shiftMonth(month,-1); pageSites(app); };
  $('#st-next').onclick = () => { app._month = shiftMonth(month, 1); pageSites(app); };
  app.querySelectorAll('.st-site').forEach(b => b.onclick = () => openSiteModal(b.dataset.date, b.dataset.site));
}
function shiftMonth(m, d){
  let [y,mo] = m.split('-').map(Number); mo += d;
  if(mo<1){ mo=12; y--; } if(mo>12){ mo=1; y++; }
  return `${y}-${String(mo).padStart(2,'0')}`;
}

/* ===== 稼働サマリー(チーフ以上)。月間の出勤数・現場数・最長連勤と手配偏りを可視化 ===== */
// しきい値(運用に合わせて調整可)
const SUM_TH = { over: 18, streak: 6, few: 3 }; // 出勤18日以上=働きすぎ / 連勤6日以上=注意 / 出勤3日以下=機会少
let SUMMARY_SORT = 'workDays';
let SUMMARY_MEMBERS_ONLY = false;
let SUMMARY_MGR = null; // 選択中の手配担当(絞り込み)。null=全体
async function pageSummary(app){
  if(LV[ME.role] < 1){ notFound(app); return; }
  const month = app._smonth || jstToday().slice(0,7);
  app._smonth = month;
  app.innerHTML = `<div class="muted">集計中…</div>`;
  let data;
  try{ data = await api(`/summary?month=${month}`); }
  catch(e){ app.innerHTML = `<div class="msg err">${h(e.message)}</div>`; return; }

  const badge = it => {
    const b=[];
    if(it.maxStreak>=SUM_TH.streak) b.push(`<span class="sum-badge streak">連勤${it.maxStreak}</span>`);
    if(it.workDays>=SUM_TH.over) b.push(`<span class="sum-badge over">働きすぎ</span>`);
    if(it.workDays<=SUM_TH.few && it.workDays>0) b.push(`<span class="sum-badge few">機会少</span>`);
    if(it.workDays===0) b.push(`<span class="sum-badge zero">稼働なし</span>`);
    return b.join(' ');
  };
  const rowcls = it => it.workDays>=SUM_TH.over?'r-over':it.maxStreak>=SUM_TH.streak?'r-streak':it.workDays<=SUM_TH.few?'r-few':'';

  let items = data.items.slice();
  if(SUMMARY_MEMBERS_ONLY) items = items.filter(it=>it.role==='member');
  // 選択中の手配担当が現データに無ければ解除
  if(SUMMARY_MGR && !data.managers.some(m=>m.name===SUMMARY_MGR)) SUMMARY_MGR = null;
  const view = SUMMARY_MGR ? items.filter(it=>it.manager_name===SUMMARY_MGR) : items;

  const sorters = {
    workDays:(a,b)=>b.workDays-a.workDays || b.shifts-a.shifts,
    shifts:(a,b)=>b.shifts-a.shifts,
    streak:(a,b)=>b.maxStreak-a.maxStreak,
    name:(a,b)=>String(a.regno).localeCompare(String(b.regno)),
  };
  view.sort(sorters[SUMMARY_SORT]||sorters.workDays);

  // 統計(絞り込み中はその手配担当のチーム)
  const active = view.filter(it=>it.workDays>0);
  const avg = active.length ? (active.reduce((s,it)=>s+it.workDays,0)/active.length) : 0;
  const overN = view.filter(it=>it.workDays>=SUM_TH.over).length;
  const streakN = view.filter(it=>it.maxStreak>=SUM_TH.streak).length;
  const fewN = view.filter(it=>it.workDays<=SUM_TH.few && it.workDays>0).length;

  // 手配の偏り(タップで絞り込み)。ランキング順=現場数降順は維持
  const maxShifts = Math.max(1, ...data.managers.map(m=>m.shifts));
  const mgrBars = data.managers.map(m=>`
    <div class="mgr-row ${SUMMARY_MGR===m.name?'sel':''}" data-mgr="${h(m.name)}" role="button" tabindex="0">
      <div class="mgr-name">${h(m.name)} <span class="muted">${m.activeMembers}/${m.members}名稼働 ・ ${m.shifts}現場</span></div>
      <div class="mgr-bar-wrap"><div class="mgr-bar" style="width:${Math.round(m.shifts/maxShifts*100)}%"></div></div>
    </div>`).join('');

  const canPay = data.items.some(it=>it.hours!==null);
  // PC表
  const trows = view.map(it=>`
    <tr class="${rowcls(it)} sum-link" data-uid="${it.uid}" title="個人スケジュールを開く">
      <td class="s-name">${h(it.name)} ${it.rank?`<span class="muted">${h(it.rank)}</span>`:''} <span class="sum-go">📅</span></td>
      <td class="c">${h(it.manager_name||'—')}</td>
      <td class="c num">${it.workDays}</td>
      <td class="c num">${it.shifts}</td>
      <td class="c num ${it.maxStreak>=SUM_TH.streak?'hot':''}">${it.maxStreak}</td>
      ${canPay?`<td class="c num">${it.hours!=null?it.hours:'—'}</td>`:''}
      <td>${badge(it)}</td>
    </tr>`).join('');
  // スマホカード
  const cards = view.map(it=>`
    <div class="sum-card ${rowcls(it)} sum-link" data-uid="${it.uid}">
      <div class="sc-top"><span class="sc-name">${h(it.name)}</span>${it.rank?`<span class="sc-rank">${h(it.rank)}</span>`:''}<span class="sc-go">📅 スケジュール</span></div>
      <div class="sc-mgr">${h(it.manager_name||'—')}</div>
      <div class="sc-stats">
        <div class="sc-stat"><b>${it.workDays}</b><span>出勤日</span></div>
        <div class="sc-stat"><b>${it.shifts}</b><span>現場</span></div>
        <div class="sc-stat ${it.maxStreak>=SUM_TH.streak?'hot':''}"><b>${it.maxStreak}</b><span>連勤</span></div>
        ${canPay?`<div class="sc-stat"><b>${it.hours!=null?it.hours:'—'}</b><span>時間</span></div>`:''}
      </div>
      ${badge(it)?`<div class="sc-badges">${badge(it)}</div>`:''}
    </div>`).join('');

  app.innerHTML = `
  <div class="sum-head">
    <div class="row" style="gap:6px;align-items:center">
      <button class="btn ghost sm" id="sm-prev">◀</button>
      <b style="font-size:16px">${month.replace('-','年')}月</b>
      <button class="btn ghost sm" id="sm-next">▶</button>
    </div>
    <label class="row" style="gap:6px;align-items:center;font-size:13px;cursor:pointer">
      <input type="checkbox" id="sm-mem" ${SUMMARY_MEMBERS_ONLY?'checked':''}> メンツのみ
    </label>
  </div>
  ${SUMMARY_MGR?`<div class="sum-filter">絞り込み中：<b>${h(SUMMARY_MGR)}</b><button class="sum-clear" id="sm-clear">✕ 全体に戻す</button></div>`:''}

  <div class="sum-stats">
    <div class="sum-stat"><div class="sum-num">${active.length}</div><div class="sum-lbl">稼働人数</div></div>
    <div class="sum-stat"><div class="sum-num">${avg.toFixed(1)}</div><div class="sum-lbl">平均出勤日</div></div>
    <div class="sum-stat ${overN?'st-over':''}"><div class="sum-num">${overN}</div><div class="sum-lbl">働きすぎ</div></div>
    <div class="sum-stat ${streakN?'st-streak':''}"><div class="sum-num">${streakN}</div><div class="sum-lbl">連勤注意</div></div>
    <div class="sum-stat ${fewN?'st-few':''}"><div class="sum-num">${fewN}</div><div class="sum-lbl">機会少</div></div>
  </div>

  <div class="card" style="margin-top:12px">
    <h3 style="margin-bottom:4px">手配の偏り（タップで絞り込み）</h3>
    <div class="muted" style="font-size:11px;margin-bottom:8px">現場数の多い順。担当をタップすると、その手配のメンバーだけ表示します。</div>
    ${mgrBars || '<div class="muted">データなし</div>'}
  </div>

  <div class="card" style="margin-top:12px">
    <div class="row" style="gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center">
      <span class="muted" style="font-size:12px">並び替え:</span>
      ${[['workDays','出勤日'],['shifts','現場数'],['streak','連勤'],['name','番号']].map(s=>`<button class="btn ghost xs sm-sort ${SUMMARY_SORT===s[0]?'on':''}" data-s="${s[0]}">${s[1]}</button>`).join('')}
      <span class="muted" style="font-size:11px;margin-left:auto">${view.length}名</span>
    </div>
    <div class="sum-table-wrap">
      <table class="sum-table">
        <thead><tr><th>氏名</th><th>担当</th><th>出勤日</th><th>現場数</th><th>最長連勤</th>${canPay?'<th>時間</th>':''}<th>状態</th></tr></thead>
        <tbody>${trows || `<tr><td colspan="${canPay?7:6}" class="muted c">該当者なし</td></tr>`}</tbody>
      </table>
    </div>
    <div class="sum-cards">${cards || '<div class="muted c">該当者なし</div>'}</div>
    <div class="muted" style="font-size:11px;margin-top:8px">※ 出勤日=現場のあった日数 / 現場数=のべ割当数(同日2現場は2) / 最長連勤=連続して現場が入った最大日数(当月内)</div>
  </div>`;

  $('#sm-prev').onclick = () => { app._smonth = shiftMonth(month,-1); pageSummary(app); };
  $('#sm-next').onclick = () => { app._smonth = shiftMonth(month, 1); pageSummary(app); };
  $('#sm-mem').onchange = e => { SUMMARY_MEMBERS_ONLY = e.target.checked; pageSummary(app); };
  const clr = $('#sm-clear'); if(clr) clr.onclick = () => { SUMMARY_MGR = null; pageSummary(app); };
  app.querySelectorAll('.sm-sort').forEach(b => b.onclick = () => { SUMMARY_SORT = b.dataset.s; pageSummary(app); });
  app.querySelectorAll('.mgr-row').forEach(b => b.onclick = () => {
    SUMMARY_MGR = (SUMMARY_MGR===b.dataset.mgr) ? null : b.dataset.mgr; pageSummary(app);
  });
